name: Nike News Update

on:
  schedule:
    - cron: '0 * * * *'  # 매 정시(1시간마다) 실행
  workflow_dispatch:      # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃 코드
        uses: actions/checkout@v3

      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          pip install google-generativeai feedparser beautifulsoup4 requests lxml

      - name: 뉴스 수집 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python nike_news.py

      - name: 결과 업데이트 (Git Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nike_news.html
          git commit -m "Update Nike News Report" || exit 0
          git push
git add index.html
